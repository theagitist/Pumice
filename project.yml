name: Pumice
options:
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  PumiceCore:
    path: Packages/PumiceCore

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SUPPORTS_MACCATALYST: NO
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    TARGETED_DEVICE_FAMILY: "2"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Pumice:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
      - path: Sources
    resources:
      - path: App/Assets.xcassets
        optional: true
    dependencies:
      - package: PumiceCore
    configFiles:
      Debug: Config/Local.xcconfig
      Release: Config/Local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER_PREFIX).Pumice
        PRODUCT_NAME: Pumice
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_CFBundleDisplayName: Pumice
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PumiceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/PumiceTests
    dependencies:
      - target: Pumice
      - package: PumiceCore
    configFiles:
      Debug: Config/Local.xcconfig
      Release: Config/Local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(PRODUCT_BUNDLE_IDENTIFIER_PREFIX).PumiceTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Pumice.app/Pumice"

schemes:
  Pumice:
    build:
      targets:
        Pumice: all
        PumiceTests: [test]
    test:
      targets:
        - PumiceTests
      gatherCoverageData: true
      coverageTargets:
        - Pumice
    run:
      config: Debug
      environmentVariables:
        - variable: CG_PDF_VERBOSE
          value: "1"
          isEnabled: true
    archive:
      config: Release
